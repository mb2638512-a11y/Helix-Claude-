# Appwrite
# Reference: https://appwrite.io/docs/deployment
services:
  appwrite:
    image: appwrite/appwrite:latest
    container_name: appwrite
    ports:
      - "80:80"
      - "443:443"
    environment:
      - _APP_ENV=production
      - _APP_OPENSOURCE=true
      - _APP_DOMAIN=${APP_DOMAIN:-localhost}
    volumes:
      - appwrite-data:/storage/appwrite
    networks:
      - helix-claude
volumes:
  appwrite-data:
networks:
  helix-claude:
    external: true
